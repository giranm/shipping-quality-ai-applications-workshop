<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 390" width="420" height="390" style="background: transparent;">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M 0 0.5 L 9 3.5 L 0 6.5" fill="none" stroke="#2C1FEB" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Arc arrows (clockwise: Trace → Dataset → Eval → Improve → Test → Trace) -->
  <path d="M 248 56 A 140 140 0 0 1 328 115" fill="none" stroke="#2C1FEB" stroke-width="2" stroke-linecap="round" marker-end="url(#ah)"/>
  <path d="M 350 182 A 140 140 0 0 1 320 278" fill="none" stroke="#2C1FEB" stroke-width="2" stroke-linecap="round" marker-end="url(#ah)"/>
  <path d="M 260 322 A 140 140 0 0 1 160 322" fill="none" stroke="#2C1FEB" stroke-width="2" stroke-linecap="round" marker-end="url(#ah)"/>
  <path d="M 102 278 A 140 140 0 0 1 71 182" fill="none" stroke="#2C1FEB" stroke-width="2" stroke-linecap="round" marker-end="url(#ah)"/>
  <path d="M 93 115 A 140 140 0 0 1 174 56" fill="none" stroke="#2C1FEB" stroke-width="2" stroke-linecap="round" marker-end="url(#ah)"/>

  <!-- Trace (top) -->
  <rect x="161" y="30" width="98" height="40" rx="8" ry="8" fill="#e8e6fd" stroke="#2C1FEB" stroke-width="2"/>
  <text x="210" y="52" font-family="'Virgil', 'Segoe Print', 'Comic Sans MS', cursive" font-size="17" fill="#2C1FEB" text-anchor="middle" dominant-baseline="central">Trace</text>

  <!-- Dataset (upper-right) -->
  <rect x="290" y="127" width="106" height="40" rx="8" ry="8" fill="#e8e6fd" stroke="#2C1FEB" stroke-width="2"/>
  <text x="343" y="149" font-family="'Virgil', 'Segoe Print', 'Comic Sans MS', cursive" font-size="17" fill="#2C1FEB" text-anchor="middle" dominant-baseline="central">Dataset</text>

  <!-- Eval (lower-right) -->
  <rect x="249" y="283" width="86" height="40" rx="8" ry="8" fill="#e8e6fd" stroke="#2C1FEB" stroke-width="2"/>
  <text x="292" y="305" font-family="'Virgil', 'Segoe Print', 'Comic Sans MS', cursive" font-size="17" fill="#2C1FEB" text-anchor="middle" dominant-baseline="central">Eval</text>

  <!-- Improve (lower-left) -->
  <rect x="73" y="283" width="110" height="40" rx="8" ry="8" fill="#e8e6fd" stroke="#2C1FEB" stroke-width="2"/>
  <text x="128" y="305" font-family="'Virgil', 'Segoe Print', 'Comic Sans MS', cursive" font-size="17" fill="#2C1FEB" text-anchor="middle" dominant-baseline="central">Improve</text>

  <!-- Test (upper-left) -->
  <rect x="35" y="127" width="84" height="40" rx="8" ry="8" fill="#e8e6fd" stroke="#2C1FEB" stroke-width="2"/>
  <text x="77" y="149" font-family="'Virgil', 'Segoe Print', 'Comic Sans MS', cursive" font-size="17" fill="#2C1FEB" text-anchor="middle" dominant-baseline="central">Test</text>

  <!-- BT logo centered at circle center (210, 190) -->
  <image href="data:image/png;base64," x="180" y="160" width="60" height="60"/>
</svg>
